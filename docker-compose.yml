services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar_day_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendar_day
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - calendar_day_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendar_day"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  calendar_day_pgdata:
